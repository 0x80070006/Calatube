name: calatube
description: Calatube - YouTube Music, sans pub
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  provider: ^6.1.1
  image_picker: ^1.0.4
  permission_handler: ^11.3.0
  url_launcher: ^6.2.2
  webview_flutter: ^4.9.0
  webview_flutter_android: ^3.16.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/noutube_inject.js

  fonts:
    - family: SuperWonder
      fonts:
        - asset: assets/fonts/SuperWonder.ttf
